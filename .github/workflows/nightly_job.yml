name: Nightly Weather Batch Job

# This section tells GitHub WHEN to run the job
on:
  schedule:
    # This is a Cron expression. It means "Run at 12:00 AM UTC every day"
    - cron: '0 0 * * *' 
  
  # This allows you to manually click a "Run" button to test it during class!
  workflow_dispatch: 

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests
          
      - name: Run Nightly Batch Script
        run: python nightly_weather_job.py
